port: 7880
bind_addresses:
  - ""
rtc:
  turn_servers:
    - host: turn.<example.com>
      port: 3478
      protocol: tcp
      secret: "<LONG_SECRET_KEY>"
    - host: turn.<example.com>
      port: 5349
      protocol: tls # Only if you've set up TLS in your coturn
      secret: "<LONG_SECRET_KEY>"
    - host: turn.<example.com>
      port: 3478
      protocol: udp
      secret: "<LONG_SECRET_KEY>"
  tcp_port: 7881
  port_range_start: 50100
  port_range_end: 50200
  use_external_ip: true
logging:
  level: info
turn:
  enabled: false
  domain: localhost
  cert_file: ""
  key_file: ""
  tls_port: 5349
  udp_port: 443
  external_tls: true
keys:
  <SUPER_SECRET_KEY>: "<SUPER_SECRET_SECRET>"
