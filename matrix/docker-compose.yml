services:

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - "443:443/udp"
    volumes:
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile

  synapse:
    image: "matrixdotorg/synapse:${SYNAPSE_VERSION}"
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=${SYNAPSE_CONFIG_PATHssg}
    volumes:
      - ./synapse:/data
    depends_on:
      - synapse_db
    #ports:
      #- "8008:8008" Direct access through Caddy

  synapse_db:
    image: "docker.io/postgres:${POSTGRES_VERSION}"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS}
    volumes:
      - ./postgres:/var/lib/postgresql/data

  coturn:
    image: "instrumentisto/coturn:${COTURN_VERSION}"
    restart: unless-stopped
    volumes:
      - ./coturn:/etc/coturn
    network_mode: "host" # Needed because Coturn needs to expose port ranges
    #ports:
      #- "49000-50000:49000-50000/udp"
      #- "3478:3478/tcp"
      #- "3478:3478/udp"
      #- "5349:5349"

  element:
    image: "vectorim/element-web:${ELEMENT_VERSION}"
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json
    #ports:
      #- "81:80" Direct access through Caddy

  synapse-admin:
    image: "etkecc/synapse-admin:${ADMIN_VERSION}"
    restart: unless-stopped
    depends_on:
      - synapse
    environment:
      - REACT_APP_SERVER=${REACT_APP_SERVER}
    ports:
      - "8081:8080"

  jwt:
    image: "ghcr.io/element-hq/lk-jwt-service:${JWT_VERSION}"
    container_name: matrix-jwt
    environment:
      - LK_JWT_PORT=${LK_JWT_PORT}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_KEY=${LIVEKIT_KEY}
      - LIVEKIT_SECRET=${LIVEKIT_SECRET}
      - LIVEKIT_FULL_ACCESS_HOMESERVERS=${LIVEKIT_FULL_ACCESS_HOMESERVERS}
    restart: unless-stopped
    #ports:
      #- "8080:8080" Direct access through Caddy
      
  livekit:
    image: "livekit/livekit-server:latest"
    container_name: matrix-livekit
    command: --dev --config /etc/livekit.yaml
    ports:
      #- "7880:7880/tcp" Direct access through Caddy
      - "7881:7881/tcp"
      - "50100-50200:50100-50200/udp"
    restart: unless-stopped
    volumes:
      - ./livekit/config.yaml:/etc/livekit.yaml:ro
